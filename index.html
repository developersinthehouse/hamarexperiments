<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hamarexperiments</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <div class="brand-lockup" aria-label="Hamarexperiments brand">
          <img src="favicon.svg" alt="" class="brand-mark">
          <span>Hamarexperiments</span>
        </div>
        <p class="eyebrow">Science Fair Lab Manual</p>
        <h1>Hamarexperiments</h1>
        <p class="intro">Ready notes, exact videos, and clean observation tables for every experiment.</p>
        <p class="team-credit">Developed by <strong>DEVELOPERS</strong></p>
      </div>
      <div class="hero-visual" aria-hidden="true">
        <div class="flask">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="orbit orbit-one"></div>
        <div class="orbit orbit-two"></div>
      </div>
    </header>

    <main>
      <section class="category-tiles" aria-label="Choose category">
        <button class="category-tile" type="button" data-filter="Shishu">
          <span>Shishu</span>
          <strong>Classes 4-5</strong>
        </button>
        <button class="category-tile" type="button" data-filter="Bal">
          <span>Bal</span>
          <strong>Classes 6-8</strong>
        </button>
        <button class="category-tile" type="button" data-filter="Kishor">
          <span>Kishor</span>
          <strong>Classes 9-10</strong>
        </button>
        <button class="category-tile" type="button" data-filter="Tarun">
          <span>Tarun</span>
          <strong>Classes 11-12</strong>
        </button>
      </section>

      <section class="toolbar" aria-label="Experiment filters">
        <div class="search-box">
          <label for="search">Find experiment</label>
          <input id="search" type="search" placeholder="Try starch, prism, Ohm, DNA...">
        </div>
        <div class="filters" role="tablist" aria-label="Groups">
          <button class="filter is-active" type="button" data-filter="all">All</button>
          <button class="filter" type="button" data-filter="Shishu">Shishu</button>
          <button class="filter" type="button" data-filter="Bal">Bal</button>
          <button class="filter" type="button" data-filter="Kishor">Kishor</button>
          <button class="filter" type="button" data-filter="Tarun">Tarun</button>
        </div>
        <div class="filters subject-filters" role="tablist" aria-label="Tarun subjects">
          <button class="subject-filter is-active" type="button" data-subject="all">All Subjects</button>
          <button class="subject-filter" type="button" data-subject="Physics">Physics</button>
          <button class="subject-filter" type="button" data-subject="Chemistry">Chemistry</button>
          <button class="subject-filter" type="button" data-subject="Biology">Biology</button>
        </div>
      </section>

      <section class="summary-grid" aria-label="Catalog summary">
        <article>
          <strong id="totalCount">0</strong>
          <span>Experiments</span>
        </article>
        <article>
          <strong>20</strong>
          <span>Marks</span>
        </article>
        <article>
          <strong>40/60</strong>
          <span>Minutes</span>
        </article>
      </section>

      <section class="layout">
        <section class="catalog-panel">
          <div class="section-heading">
            <h2>Experiments</h2>
            <span id="resultCount"></span>
          </div>
          <div id="cards" class="cards" aria-live="polite"></div>
        </section>
      </section>
    </main>

    <footer class="site-footer">
      <span>Hamarexperiments</span>
      <strong>Developed by DEVELOPERS</strong>
    </footer>

    <dialog id="detailDialog">
      <article class="detail">
        <button class="close-button" type="button" aria-label="Close">x</button>
        <div id="detailContent"></div>
      </article>
    </dialog>

    <script src="videos.js"></script>
    <script src="app.js"></script>
  </body>
</html>
